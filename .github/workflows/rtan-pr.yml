name: "🤖 RTAN PR Review"

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  rtan-review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: [self-hosted, Linux, ARM64, container]
    name: RTAN PR 리뷰
    steps:
      - name: RTAN PR Review
        uses: teamsparta-axops/axops-rtan-pr@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: "no-key"
          OPENAI_API_BASE: "http://10.200.125.103:8000/v1"
        with:
          args: "auto_review"

  rtan-self-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: [self-hosted, Linux, ARM64, container]
    name: RTAN 셀프리뷰
    steps:
      - name: RTAN Self Review
        uses: teamsparta-axops/axops-rtan-pr@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: "no-key"
          OPENAI_API_BASE: "http://10.200.125.103:8000/v1"
        with:
          args: "self_review"

  rtan-adr-check:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: [self-hosted, Linux, ARM64, container]
    name: RTAN ADR 컴플라이언스
    steps:
      - name: RTAN ADR Check
        uses: teamsparta-axops/axops-rtan-pr@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: "no-key"
          OPENAI_API_BASE: "http://10.200.125.103:8000/v1"
        with:
          args: "adr_compliance"
